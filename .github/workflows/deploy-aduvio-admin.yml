name: Publish Module To API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  publish-module:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: FTPUSERNAME

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package and upload module zip
        env:
          FTP_HOST: ${{ vars.FTPHOST }}
          FTP_PORT: ${{ vars.FTP_PORT }}
          FTP_SCHEME: ${{ vars.FTP_SCHEME }}
          FTP_USER: ${{ secrets.FTPUSERNAME }}
          FTP_PASSWORD: ${{ secrets.FTPPASSWORD }}
          MODULE_SOURCE_DIR: ${{ vars.MODULE_SOURCE_DIR }}
          PUBLIC_MODULE_UUID: ${{ vars.PUBLIC_MODULE_UUID }}
          MODULE_API_BASE_URL: ${{ vars.MODULE_API_BASE_URL }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          # Match Aduvio_admin flow defaults
          SOURCE_DIR="${MODULE_SOURCE_DIR:-.}"
          STYLE_FILE="${SOURCE_DIR%/}/css/style.css"

          if [ ! -f "${STYLE_FILE}" ]; then
            echo "Missing required style file: ${STYLE_FILE}"
            exit 1
          fi

          # Required fields from style.css (same required set used in add-inc.php)
          MODULE_NAME="$(grep -iE '^Module[ -]Name:' "${STYLE_FILE}" | head -n1 | cut -d: -f2- | xargs)"
          MACHINE_NAME="$(grep -iE '^Machine[ -]Name:' "${STYLE_FILE}" | head -n1 | cut -d: -f2- | xargs)"
          AUTHOR="$(grep -iE '^Author:' "${STYLE_FILE}" | head -n1 | cut -d: -f2- | xargs)"
          VERSION="$(grep -iE '^Version:' "${STYLE_FILE}" | head -n1 | cut -d: -f2- | xargs)"

          for v in MODULE_NAME MACHINE_NAME AUTHOR VERSION; do
            if [ -z "${!v}" ]; then
              echo "Missing required style.css value: ${v}"
              exit 1
            fi
          done

          # Auto-increment patch version as major.minor.<run_number>
          BASE_VERSION="$(echo "${VERSION}" | cut -d. -f1,2)"
          if ! echo "${BASE_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+$'; then
            echo "Version in style.css must start with major.minor (example: 1.1)"
            exit 1
          fi

          PUBLISH_VERSION="${BASE_VERSION}.${RUN_NUMBER}"
          VERSION_DASH="${PUBLISH_VERSION//./-}"
          ZIP_NAME="${MACHINE_NAME}-${VERSION_DASH}.zip"

          # Create staging folder and remove same root-level removables as add-inc.php
          STAGE_DIR="${RUNNER_TEMP}/public-module-stage"
          rm -rf "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}"
          cp -R "${SOURCE_DIR}/." "${STAGE_DIR}/"

          rm -rf "${STAGE_DIR}/.git" "${STAGE_DIR}/.vscode" "${STAGE_DIR}/_changelogs"
          rm -f "${STAGE_DIR}/.gitignore"

          # Zip entire staged folder contents
          (
            cd "${STAGE_DIR}"
            zip -r "${RUNNER_TEMP}/${ZIP_NAME}" .
          )

          # Resolve module UUID: use explicit var first, else fetch by machine_name
          MODULE_UUID="${PUBLIC_MODULE_UUID:-}"
          if [ -z "${MODULE_UUID}" ]; then
            API_BASE_URL="${MODULE_API_BASE_URL:-https://api.aduv.io}"
            MODULE_UUID="$(curl --fail --show-error --silent --connect-timeout 20 --max-time 90 "${API_BASE_URL}/public-modules/fetch-modules.php" \
              | jq -r --arg machine "${MACHINE_NAME}" '.data[] | select(.machine_name == $machine) | .uuid' \
              | head -n1)"
          fi

          if [ -z "${MODULE_UUID}" ] || [ "${MODULE_UUID}" = "null" ]; then
            echo "Could not resolve module UUID for machine_name='${MACHINE_NAME}'."
            echo "Set vars.PUBLIC_MODULE_UUID or create the module once in Aduvio Admin first."
            exit 1
          fi

          for v in FTP_HOST FTP_USER FTP_PASSWORD; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required configuration: ${v}"
              exit 1
            fi
          done

          PORT="${FTP_PORT:-21}"
          SCHEME="${FTP_SCHEME:-ftp}"
          TARGET_URL="${SCHEME}://${FTP_HOST}:${PORT}/public-modules/${MODULE_UUID}/${ZIP_NAME}"

          echo "Uploading ${ZIP_NAME} to /public-modules/${MODULE_UUID}/ on ${FTP_HOST}:${PORT} using ${SCHEME}"
          ls -lh "${RUNNER_TEMP}/${ZIP_NAME}"

          curl --fail --show-error --silent --connect-timeout 20 --max-time 180 --retry 2 --retry-delay 5 --ftp-pasv --disable-epsv --ftp-create-dirs \
            --user "${FTP_USER}:${FTP_PASSWORD}" \
            --upload-file "${RUNNER_TEMP}/${ZIP_NAME}" \
            "${TARGET_URL}"

          {
            echo "## Module Published"
            echo "- Module: ${MODULE_NAME}"
            echo "- Machine Name: ${MACHINE_NAME}"
            echo "- Base Version (style.css): ${VERSION}"
            echo "- Published Version: ${PUBLISH_VERSION}"
            echo "- Author: ${AUTHOR}"
            echo "- ZIP: ${ZIP_NAME}"
            echo "- API folder: /public-modules/${MODULE_UUID}/"
          } >> "${GITHUB_STEP_SUMMARY}"
