name: Publish Module To API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: FTPUSERNAME

    steps:
      - uses: actions/checkout@v4

      - name: Build and upload module zip
        env:
          FTP_HOST: ${{ vars.FTPHOST }}
          FTP_PORT: ${{ vars.FTP_PORT }}
          FTP_SCHEME: ${{ vars.FTP_SCHEME }}
          FTP_TARGET_BASE_DIR: ${{ vars.FTP_TARGET_BASE_DIR }}
          FTP_USER: ${{ secrets.FTPUSERNAME }}
          FTP_PASSWORD: ${{ secrets.FTPPASSWORD }}
          MODULE_SOURCE_DIR: ${{ vars.MODULE_SOURCE_DIR }}
          MODULE_API_BASE_URL: ${{ vars.MODULE_API_BASE_URL }}
          PUBLIC_MODULE_UUID: ${{ vars.PUBLIC_MODULE_UUID }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          src="${MODULE_SOURCE_DIR:-.}"
          style="${src%/}/css/style.css"
          [ -f "${style}" ] || { echo "Missing ${style}"; exit 1; }

          module_name="$(grep -iE '^Module[ -]Name:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          machine_name="$(grep -iE '^Machine[ -]Name:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          author="$(grep -iE '^Author:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          version="$(grep -iE '^Version:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          for v in module_name machine_name author version; do
            [ -n "${!v}" ] || { echo "Missing required style.css value: ${v}"; exit 1; }
          done

          base_version="$(printf '%s' "${version}" | cut -d. -f1,2)"
          echo "${base_version}" | grep -Eq '^[0-9]+\.[0-9]+$' || {
            echo "Version must start with major.minor (example: 1.1)"
            exit 1
          }
          publish_version="${base_version}.${RUN_NUMBER}"
          zip_name="${machine_name}-${publish_version//./-}.zip"

          stage="${RUNNER_TEMP}/module-stage"
          rm -rf "${stage}"
          mkdir -p "${stage}"
          cp -R "${src}/." "${stage}/"
          rm -rf "${stage}/.git" "${stage}/.vscode" "${stage}/_changelogs"
          rm -f "${stage}/.gitignore"
          (cd "${stage}" && zip -rq "${RUNNER_TEMP}/${zip_name}" .)

          module_uuid="${PUBLIC_MODULE_UUID:-}"
          if [ -z "${module_uuid}" ]; then
            api_base="${MODULE_API_BASE_URL:-https://api.aduv.io}"
            module_uuid="$(curl --fail --show-error --silent --connect-timeout 20 --max-time 90 "${api_base}/public-modules/fetch-modules.php" \
              | jq -r --arg machine "${machine_name}" '.data[] | select(.machine_name == $machine) | .uuid' \
              | head -n1)"
          fi
          [ -n "${module_uuid}" ] && [ "${module_uuid}" != "null" ] || {
            echo "Could not resolve UUID for machine_name='${machine_name}'"
            exit 1
          }

          for v in FTP_HOST FTP_USER FTP_PASSWORD; do
            [ -n "${!v:-}" ] || { echo "Missing required config: ${v}"; exit 1; }
          done
          echo "${FTP_HOST}" | grep -Eq '^[0-9]+$' && {
            echo "FTPHOST looks like a port (${FTP_HOST}). Set a real host."
            exit 1
          }

          port="${FTP_PORT:-21}"
          scheme="${FTP_SCHEME:-ftp}"
          base_dir="${FTP_TARGET_BASE_DIR:-/public-modules}"
          base_dir="$(printf '%s' "${base_dir}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          base_dir="${base_dir%/}"
          target_dir="${base_dir}/${module_uuid}/"
          target_url="${scheme}://${FTP_HOST}:${port}${target_dir}${zip_name}"

          curl --fail --show-error --silent --connect-timeout 20 --max-time 180 --retry 2 --retry-delay 5 --ftp-pasv --disable-epsv --ftp-create-dirs \
            --user "${FTP_USER}:${FTP_PASSWORD}" \
            --upload-file "${RUNNER_TEMP}/${zip_name}" \
            "${target_url}"

          remote_copy="${RUNNER_TEMP}/remote-${zip_name}"
          curl --fail --show-error --silent --connect-timeout 20 --max-time 120 --ftp-pasv --disable-epsv \
            --user "${FTP_USER}:${FTP_PASSWORD}" \
            --output "${remote_copy}" \
            "${target_url}"

          local_sha="$(sha256sum "${RUNNER_TEMP}/${zip_name}" | awk '{print $1}')"
          remote_sha="$(sha256sum "${remote_copy}" | awk '{print $1}')"
          [ "${local_sha}" = "${remote_sha}" ] || { echo "Upload verification failed"; exit 1; }

          {
            echo "## Module Published"
            echo "- Module: ${module_name}"
            echo "- Machine Name: ${machine_name}"
            echo "- Base Version: ${version}"
            echo "- Published Version: ${publish_version}"
            echo "- Author: ${author}"
            echo "- FTP Host: ${FTP_HOST}:${port}"
            echo "- Module UUID: ${module_uuid}"
            echo "- ZIP: ${zip_name}"
            echo "- Target Dir: ${target_dir}"
          } >> "${GITHUB_STEP_SUMMARY}"
