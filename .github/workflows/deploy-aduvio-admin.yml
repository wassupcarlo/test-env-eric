name: Publish Module To API

# Run automatically for changes on main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build, upload, verify, and publish a module version in one job.
  publish:
    runs-on: ubuntu-latest
    environment: FTPUSERNAME

    steps:
      # Pull repository contents into the runner workspace.
      - uses: actions/checkout@v6

      - name: Build and upload module zip
        env:
          # Deployment and API configuration from repository variables/secrets.
          FTP_HOST: ${{ vars.FTPHOST }}
          FTP_PORT: ${{ vars.FTP_PORT }}
          FTP_SCHEME: ${{ vars.FTP_SCHEME }}
          FTP_USER: ${{ secrets.FTPUSERNAME }}
          FTP_PASSWORD: ${{ secrets.FTPPASSWORD }}
          MODULE_SOURCE_DIR: ${{ vars.MODULE_SOURCE_DIR }}
          MODULE_API_BASE_URL: ${{ vars.MODULE_API_BASE_URL }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Exit on first failure, unset variable usage, or pipeline error.
          set -euo pipefail

          # Resolve module source location and find metadata for either layout:
          # 1) single-panel modules: <src>/css/style.css
          # 2) admin/user modules:    <src>/_admin/modules/css/style.css
          src="${MODULE_SOURCE_DIR:-.}"
          style=""
          for candidate in "${src%/}/css/style.css" "${src%/}/_admin/modules/css/style.css"; do
            if [ -f "${candidate}" ]; then
              style="${candidate}"
              break
            fi
          done
          [ -n "${style}" ] || {
            echo "Missing style.css (checked ${src%/}/css/style.css and ${src%/}/_admin/modules/css/style.css)"
            exit 1
          }

          # Parse module metadata from the style.css header.
          module_name="$(grep -iE '^Module[ -]Name:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          machine_name="$(grep -iE '^Machine[ -]Name:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          author="$(grep -iE '^Author:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          version="$(grep -iE '^Version:' "${style}" | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          # Ensure all metadata fields exist before building artifacts.
          for v in module_name machine_name author version; do
            [ -n "${!v}" ] || { echo "Missing required style.css value: ${v}"; exit 1; }
          done

          # Normalize version to major.minor.
          base_version="$(printf '%s' "${version}" | cut -d. -f1,2)"
          echo "${base_version}" | grep -Eq '^[0-9]+\.[0-9]+$' || {
            echo "Version must start with major.minor (example: 1.1)"
            exit 1
          }

          # Fetch latest published version from the API and compute patch counter.
          # Resets to 0 when major.minor changes; increments otherwise.
          api_modules_response="$(curl --fail --show-error --silent --connect-timeout 20 --max-time 90 "${MODULE_API_BASE_URL}/public-modules/fetch-modules.php")"
          latest_published="$(printf '%s' "${api_modules_response}" | jq -r --arg machine "${machine_name}" '.data[] | select(.machine_name == $machine) | .version' | head -n1)"
          latest_base="$(printf '%s' "${latest_published}" | cut -d. -f1,2)"
          latest_patch="$(printf '%s' "${latest_published}" | cut -d. -f3)"
          if [ "${latest_base}" = "${base_version}" ]; then
            publish_patch=$(( ${latest_patch:-0} + 1 ))
          else
            publish_patch=0
          fi
          [ "${publish_patch}" -eq 0 ] && publish_version="${base_version}" || publish_version="${base_version}.${publish_patch}"
          zip_name="${machine_name}-${publish_version//./-}.zip"

          # Stage a clean copy of the module and create the release zip.
          stage="${RUNNER_TEMP}/module-stage"
          rm -rf "${stage}"
          mkdir -p "${stage}"
          cp -R "${src}/." "${stage}/"
          rm -rf "${stage}/.git" "${stage}/.vscode" "${stage}/_changelogs"
          rm -f "${stage}/.gitignore"

          (cd "${stage}" && zip -rq "${RUNNER_TEMP}/${zip_name}" .)

          # Validate all required deployment configuration values.
          for v in MODULE_API_BASE_URL FTP_HOST FTP_PORT FTP_SCHEME FTP_USER FTP_PASSWORD; do
            [ -n "${!v:-}" ] || { echo "Missing required config: ${v}"; exit 1; }
          done

          # Resolve the module UUID from the cached API response.
          api_base="${MODULE_API_BASE_URL}"
          module_uuid="$(printf '%s' "${api_modules_response}" | jq -r --arg machine "${machine_name}" '.data[] | select(.machine_name == $machine) | .uuid' | head -n1)"
          [ -n "${module_uuid}" ] && [ "${module_uuid}" != "null" ] || {
            echo "Could not resolve UUID for machine_name='${machine_name}'"
            exit 1
          }

          # Basic FTP input sanity checks.
          echo "${FTP_HOST}" | grep -Eq '^[0-9]+$' && {
            echo "FTPHOST looks like a port (${FTP_HOST}). Set a real host."
            exit 1
          }
          echo "${FTP_PORT}" | grep -Eq '^[0-9]+$' || {
            echo "FTP_PORT must be a number."
            exit 1
          }
          # Build final FTP destination URL for this module/version artifact.
          port="${FTP_PORT}"
          scheme="${FTP_SCHEME}"
          target_dir="/${module_uuid}/"
          target_url="${scheme}://${FTP_HOST}:${port}${target_dir}${zip_name}"

          # Upload the zip to FTP.
          curl --fail --show-error --silent --connect-timeout 20 --max-time 180 --retry 2 --retry-delay 5 --ftp-pasv --disable-epsv --ftp-create-dirs \
            --user "${FTP_USER}:${FTP_PASSWORD}" \
            --upload-file "${RUNNER_TEMP}/${zip_name}" \
            "${target_url}"

          # Download the uploaded file and verify checksum matches local artifact.
          remote_copy="${RUNNER_TEMP}/remote-${zip_name}"
          curl --fail --show-error --silent --connect-timeout 20 --max-time 120 --ftp-pasv --disable-epsv \
            --user "${FTP_USER}:${FTP_PASSWORD}" \
            --output "${remote_copy}" \
            "${target_url}"

          local_sha="$(sha256sum "${RUNNER_TEMP}/${zip_name}" | awk '{print $1}')"
          remote_sha="$(sha256sum "${remote_copy}" | awk '{print $1}')"
          [ "${local_sha}" = "${remote_sha}" ] || { echo "Upload verification failed"; exit 1; }

          # Record this published version in the API.
          publish_url="${api_base}/public-modules/publish-version.php"
          publish_response="$(curl --fail --show-error --silent --connect-timeout 20 --max-time 90 \
            --data-urlencode "key=s25FG6_5HieVGlg" \
            --data-urlencode "machine_name=${machine_name}" \
            --data-urlencode "module_uuid=${module_uuid}" \
            --data-urlencode "version=${publish_version}" \
            "${publish_url}")"
          echo "${publish_response}" | jq -e '.success == true' >/dev/null || {
            echo "Version log publish failed: ${publish_response}"
            exit 1
          }

          # Write a concise deployment summary into the GitHub Actions job summary.
          {
            echo "## Module Published"
            echo "- Module: ${module_name}"
            echo "- Machine Name: ${machine_name}"
            echo "- Base Version: ${version}"
            echo "- Published Version: ${publish_version}"
            echo "- Author: ${author}"
            echo "- FTP Host: ${FTP_HOST}:${port}"
            echo "- Module UUID: ${module_uuid}"
            echo "- ZIP: ${zip_name}"
            echo "- Target Dir: ${target_dir}"
            echo "- Version Log: updated"
          } >> "${GITHUB_STEP_SUMMARY}"