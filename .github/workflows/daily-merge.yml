name: Daily Merge

on: 
  schedule:
    - cron: '0 9 * * *' # Every day at 4:00 AM EST
  workflow_dispatch:

permissions:
  contents: write
  # Allow this workflow to start the deployment workflow after pushing main.
  actions: write

# Prevent two merge jobs from running against main at the same time.
concurrency:
  group: daily-merge-staging-to-main
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DAILY_MERGE_APP_ID }}
          private-key: ${{ secrets.DAILY_MERGE_APP_PRIVATE_KEY }}

    # Go to main
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

    # Set up the app identity used for merge commits.
      - name: Configure Git Identity
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ vars.DAILY_MERGE_APP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

    # fetch staging and merge into main, then push to origin
      - name: Merge staging into main
        run: |
          git fetch origin staging:refs/remotes/origin/staging
          git merge origin/staging --no-ff -m "Daily merge staging into main"
          git push origin main